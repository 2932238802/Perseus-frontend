name: Windows Release Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    - name: 拉取最新代码
      uses: actions/checkout@v4

    - name: 自动配置 Qt 6 环境
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.4.2' 
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw' 

    - name: 编译项目
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -G "MinGW Makefiles"
        cmake --build . --config Release -j4

    - name: 打包依赖 (windeployqt)
      run: |
        cd build
        windeployqt --compiler-runtime Perseus.exe

    - name: 上传最终的压缩包
      uses: actions/upload-artifact@v4
      with:
        name: Perseus-Windows-Portable
        path: |
          build/Perseus.exe
          build/*.dll
          build/platforms/
          build/styles/
